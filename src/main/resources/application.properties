spring.application.name=url-shortener

# ========== DATABASE ==========
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:admin123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========== SERVER ==========
server.port=${PORT:8080}
app.base-url=${RAILWAY_STATIC_URL:http://localhost:8080}
app.short-code-length=7

# ========== CORS ==========
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001,*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ========== REDIS (Optional) ==========
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:0}
spring.data.redis.timeout=1000ms
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ========== KAFKA (Optional) ==========
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:}
spring.kafka.enabled=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ========== RATE LIMITING ==========
app.rate-limit.requests=10
app.rate-limit.window=20

# ========== LOGGING ==========
logging.level.com.urlshortener=INFO
logging.level.org.springframework.web=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=INFO